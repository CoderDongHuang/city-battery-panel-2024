<svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 电车图标设计 -->
  <rect width="60" height="60" rx="30" fill="url(#gradient)"/>
  
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
  </defs>
  
  <!-- 电车主体 -->
  <rect x="10" y="20" width="40" height="15" rx="3" fill="white"/>
  
  <!-- 车窗 -->
  <rect x="15" y="22" width="8" height="5" rx="1" fill="#3498db"/>
  <rect x="27" y="22" width="8" height="5" rx="1" fill="#3498db"/>
  <rect x="39" y="22" width="8" height="5" rx="1" fill="#3498db"/>
  
  <!-- 车轮 -->
  <circle cx="18" cy="38" r="4" fill="#2c3e50"/>
  <circle cx="42" cy="38" r="4" fill="#2c3e50"/>
  
  <!-- 车轮内圈 -->
  <circle cx="18" cy="38" r="2" fill="#ecf0f1"/>
  <circle cx="42" cy="38" r="2" fill="#ecf0f1"/>
  
  <!-- 车顶天线 -->
  <rect x="28" y="15" width="4" height="5" fill="#e74c3c"/>
  <circle cx="30" cy="15" r="2" fill="#e74c3c"/>
  
  <!-- 车灯 -->
  <circle cx="12" cy="25" r="1.5" fill="#f1c40f"/>
  <circle cx="48" cy="25" r="1.5" fill="#f1c40f"/>
  
  <!-- 装饰线条 -->
  <rect x="10" y="28" width="40" height="1" fill="#3498db"/>
</svg>